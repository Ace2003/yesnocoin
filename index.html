<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感硬币 - Inspiration Coin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        .coin-wrapper {
            perspective: 1200px;
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .coin {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
            cursor: pointer;
        }

        .coin.flipping {
            animation: coinFlip 1s ease-out forwards;
        }

        @keyframes coinFlip {
            0% {
                transform: rotateY(0deg) rotateX(0deg) scale(1);
            }
            25% {
                transform: rotateY(180deg) rotateX(15deg) scale(1.1);
            }
            50% {
                transform: rotateY(360deg) rotateX(-10deg) scale(1.05);
            }
            75% {
                transform: rotateY(540deg) rotateX(8deg) scale(1.02);
            }
            100% {
                transform: rotateY(720deg) rotateX(0deg) scale(1);
            }
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .coin-style-classic .coin-face {
            background: linear-gradient(145deg, #ffd700 0%, #ffb347 50%, #ff8c00 100%);
            border: 8px solid rgba(255, 255, 255, 0.3);
        }

        .coin-style-modern .coin-face {
            background: linear-gradient(145deg, #4facfe 0%, #00f2fe 100%);
            border: 8px solid rgba(255, 255, 255, 0.3);
        }

        .coin-style-dark .coin-face {
            background: linear-gradient(145deg, #434343 0%, #000000 100%);
            border: 8px solid rgba(255, 255, 255, 0.2);
        }

        .coin-style-rainbow .coin-face {
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow 3s ease infinite;
            border: 8px solid rgba(255, 255, 255, 0.4);
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .simple-dice-container {
            perspective: 1200px;
        }

        .simple-dice {
            width: 180px;
            height: 180px;
            position: relative;
            cursor: pointer;
        }

        .simple-dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            backface-visibility: hidden;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.1),
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.3);
            transform-style: preserve-3d;
        }

        .simple-dice-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
            pointer-events: none;
            border-radius: 20px 20px 0 0;
        }

        .simple-dice-face .dots {
            display: grid;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }

        .simple-dice-face .dot {
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .dice-style-classic .simple-dice-face {
            background: linear-gradient(145deg, #ffd700 0%, #ffb347 50%, #ff8c00 100%);
        }

        .dice-style-modern .simple-dice-face {
            background: linear-gradient(145deg, #4facfe 0%, #00f2fe 100%);
        }

        .dice-style-dark .simple-dice-face {
            background: linear-gradient(145deg, #434343 0%, #000000 100%);
        }

        .dice-style-rainbow .simple-dice-face {
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow 3s ease infinite;
        }

        .result-display {
            margin: 2rem auto;
            padding: 1.5rem 3rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            min-width: 200px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .result-display.show {
            opacity: 1;
            transform: translateY(0);
        }

        .result-text {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hint {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            transition: right 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .settings-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #e0e0e0;
            color: #333;
        }

        .setting-group {
            margin-bottom: 2rem;
        }

        .setting-group label {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .style-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .style-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: #666;
        }

        .style-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .style-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            font-weight: 500;
        }

        .style-btn.classic {
            background: linear-gradient(145deg, #ffd700 0%, #ffb347 100%);
            color: white;
        }

        .style-btn.classic.active {
            box-shadow: 0 0 0 3px rgba(255, 179, 71, 0.3);
        }

        .style-btn.modern {
            background: linear-gradient(145deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .style-btn.modern.active {
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.3);
        }

        .style-btn.dark {
            background: linear-gradient(145deg, #434343 0%, #000000 100%);
            color: white;
        }

        .style-btn.dark.active {
            box-shadow: 0 0 0 3px rgba(67, 67, 67, 0.3);
        }

        .style-btn.rainbow {
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
            color: white;
        }

        .style-btn.rainbow.active {
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.3);
        }

        .slider-container {
            width: 100%;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .slider-value {
            text-align: center;
            color: #667eea;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        .slider-label {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .theme-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: #666;
        }

        .theme-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .theme-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            font-weight: 500;
        }

        .theme-btn.purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .theme-btn.blue {
            background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            color: white;
        }

        .theme-btn.green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .theme-btn.orange {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .coin, .simple-dice {
                width: 150px;
                height: 150px;
            }

            .simple-dice-face {
                font-size: 2.5rem;
            }

            .result-text {
                font-size: 2rem;
            }

            .settings-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>灵感硬币</h1>
        <p class="subtitle">点击硬币或按 Enter 键获取决策灵感</p>
        
        <div class="coin-wrapper">
            <div id="decision-display"></div>
        </div>

        <div class="result-display" id="result-display">
            <div class="result-text" id="result-text"></div>
        </div>

        <p class="hint" id="hint">点击硬币或按 Enter 键开始</p>
    </div>

    <button class="settings-btn" id="settings-btn">⚙️</button>

    <div class="overlay" id="overlay"></div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h2>设置</h2>
            <button class="close-btn" id="close-btn">×</button>
        </div>

        <div class="setting-group">
            <label>决策个数</label>
            <div class="slider-container">
                <input type="range" min="2" max="6" value="2" class="slider" id="decision-slider">
                <div class="slider-value" id="slider-value">2</div>
                <div class="slider-label" id="slider-label">硬币 (Yes/No)</div>
            </div>
        </div>

        <div class="setting-group">
            <label>样式风格</label>
            <div class="style-options">
                <button class="style-btn classic active" data-style="classic">经典金</button>
                <button class="style-btn modern" data-style="modern">现代蓝</button>
                <button class="style-btn dark" data-style="dark">暗黑</button>
                <button class="style-btn rainbow" data-style="rainbow">彩虹</button>
            </div>
        </div>

        <div class="setting-group">
            <label>背景主题</label>
            <div class="theme-options">
                <button class="theme-btn purple active" data-theme="purple">紫色</button>
                <button class="theme-btn blue" data-theme="blue">蓝色</button>
                <button class="theme-btn green" data-theme="green">绿色</button>
                <button class="theme-btn orange" data-theme="orange">橙色</button>
            </div>
        </div>
    </div>

    <script>
        class DecisionMaker {
            constructor() {
                this.decisionCount = 2;
                this.currentStyle = 'classic';
                this.currentTheme = 'purple';
                this.isAnimating = false;
                
                this.options = {
                    2: ['Yes', 'No'],
                    3: ['是', '否', '再想想'],
                    4: ['A', 'B', 'C', 'D'],
                    5: ['1', '2', '3', '4', '5'],
                    6: ['1', '2', '3', '4', '5', '6']
                };

                this.themes = {
                    purple: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    blue: 'linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%)',
                    green: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)',
                    orange: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'
                };

                this.init();
            }

            init() {
                this.cacheElements();
                this.bindEvents();
                this.renderDecision();
            }

            cacheElements() {
                this.decisionDisplay = document.getElementById('decision-display');
                this.resultDisplay = document.getElementById('result-display');
                this.resultText = document.getElementById('result-text');
                this.hint = document.getElementById('hint');
                this.settingsBtn = document.getElementById('settings-btn');
                this.settingsPanel = document.getElementById('settings-panel');
                this.closeBtn = document.getElementById('close-btn');
                this.overlay = document.getElementById('overlay');
                this.decisionSlider = document.getElementById('decision-slider');
                this.sliderValue = document.getElementById('slider-value');
                this.sliderLabel = document.getElementById('slider-label');
                this.styleBtns = document.querySelectorAll('.style-btn');
                this.themeBtns = document.querySelectorAll('.theme-btn');
            }

            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !this.isAnimating) {
                        this.flip();
                    }
                });

                this.settingsBtn.addEventListener('click', () => this.openSettings());
                this.closeBtn.addEventListener('click', () => this.closeSettings());
                this.overlay.addEventListener('click', () => this.closeSettings());

                this.decisionSlider.addEventListener('input', (e) => {
                    this.updateDecisionCount(parseInt(e.target.value));
                });

                this.styleBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.setStyle(btn.dataset.style);
                    });
                });

                this.themeBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.setTheme(btn.dataset.theme);
                    });
                });
            }

            updateDecisionCount(count) {
                this.decisionCount = count;
                this.sliderValue.textContent = count;
                
                const labels = {
                    2: '硬币 (Yes/No)',
                    3: '三面骰子',
                    4: '四面骰子',
                    5: '五面骰子',
                    6: '六面骰子'
                };
                this.sliderLabel.textContent = labels[count];
                
                this.renderDecision();
                this.hideResult();
            }

            setStyle(style) {
                this.currentStyle = style;
                this.styleBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.style === style);
                });
                this.renderDecision();
            }

            setTheme(theme) {
                this.currentTheme = theme;
                this.themeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                document.body.style.background = this.themes[theme];
            }

            openSettings() {
                this.settingsPanel.classList.add('open');
                this.overlay.classList.add('show');
            }

            closeSettings() {
                this.settingsPanel.classList.remove('open');
                this.overlay.classList.remove('show');
            }

            renderDecision() {
                if (this.decisionCount === 2) {
                    this.renderCoin();
                } else {
                    this.renderSimpleDice();
                }
            }

            renderCoin() {
                const options = this.options[2];
                this.decisionDisplay.innerHTML = `
                    <div class="coin coin-style-${this.currentStyle}" id="coin">
                        <div class="coin-face" id="coin-front">${options[0]}</div>
                        <div class="coin-face" style="transform: rotateY(180deg);" id="coin-back">${options[1]}</div>
                    </div>
                `;
                
                setTimeout(() => {
                    document.getElementById('coin').addEventListener('click', () => {
                        if (!this.isAnimating) this.flip();
                    });
                }, 0);
            }

            renderSimpleDice() {
                const options = this.options[this.decisionCount];
                this.decisionDisplay.innerHTML = `
                    <div class="simple-dice-container">
                        <div class="simple-dice dice-style-${this.currentStyle}" id="simple-dice" data-count="${this.decisionCount}">
                            <div class="simple-dice-face" id="dice-face">
                                <span id="dice-value">${options[0]}</span>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    document.getElementById('simple-dice').addEventListener('click', () => {
                        if (!this.isAnimating) this.flip();
                    });
                }, 0);
            }

            flip() {
                if (this.isAnimating) return;
                
                this.isAnimating = true;
                this.hideResult();
                
                const options = this.options[this.decisionCount];
                const resultIndex = Math.floor(Math.random() * options.length);
                const result = options[resultIndex];

                if (this.decisionCount === 2) {
                    this.animateCoin(resultIndex);
                } else {
                    this.animateSimpleDice(resultIndex, result);
                }

                setTimeout(() => {
                    this.showResult(result);
                    this.isAnimating = false;
                }, this.decisionCount === 2 ? 1000 : 1200);
            }

            animateCoin(resultIndex) {
                const coin = document.getElementById('coin');
                const coinFront = document.getElementById('coin-front');
                const coinBack = document.getElementById('coin-back');
                
                const options = this.options[2];

                if (resultIndex === 0) {
                    coinFront.textContent = options[0];
                    coinBack.textContent = options[1];
                } else {
                    coinFront.textContent = options[1];
                    coinBack.textContent = options[0];
                }

                coin.classList.add('flipping');
                setTimeout(() => {
                    coin.classList.remove('flipping');
                }, 1000);
            }

            animateSimpleDice(resultIndex, result) {
                const dice = document.getElementById('simple-dice');
                const diceValue = document.getElementById('dice-value');
                if (!dice || !diceValue) return;

                const duration = 1000;
                const startTime = performance.now();
                
                const options = this.options[this.decisionCount];
                let frameCount = 0;
                const totalFrames = Math.floor(duration / 50);

                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    const currentFrame = Math.floor(progress * totalFrames);
                    if (currentFrame > frameCount) {
                        frameCount = currentFrame;
                        const randomIndex = Math.floor(Math.random() * options.length);
                        diceValue.textContent = options[randomIndex];
                    }

                    const wobbleX = Math.sin(progress * Math.PI * 6) * (1 - progress) * 20;
                    const wobbleY = Math.cos(progress * Math.PI * 6) * (1 - progress) * 20;
                    const scale = 1 + Math.sin(progress * Math.PI) * 0.15;
                    const rotation = progress * 1080;
                    
                    dice.style.transform = `
                        rotateX(${wobbleX + rotation * 0.3}deg) 
                        rotateY(${wobbleY + rotation}deg) 
                        rotateZ(${wobbleX * 0.5}deg)
                        scale(${scale})
                    `;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        diceValue.textContent = result;
                        dice.style.transform = 'rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1)';
                    }
                };

                requestAnimationFrame(animate);
            }

            showResult(result) {
                this.resultText.textContent = result;
                this.resultDisplay.classList.add('show');
                this.hint.textContent = '点击硬币或按 Enter 键再次获取';
            }

            hideResult() {
                this.resultDisplay.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new DecisionMaker();
        });
    </script>
</body>
</html>
